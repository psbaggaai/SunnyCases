name: Sunny Case Tracker Refresh

on:
  workflow_dispatch:
  schedule:
    - cron: "30 0 * * *"
    - cron: "0 14 * * *"

jobs:
  refresh:
    runs-on: [self-hosted, linux, x64, india]
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Configure git identity
        run: |
          git config user.name "SunnyCaseTracker Bot"
          git config user.email "actions@users.noreply.github.com"

      - name: Refresh data, push, and deploy
        env:
          GITHUB_PAT: ${{ secrets.GH_PAT }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npm run sync-and-publish

      - name: Stop runner instance after queued work completes
        if: always()
        run: |
          nohup sudo bash -c '
            for attempt in $(seq 1 90); do
              if pgrep -fa "[R]unner.Worker" >/dev/null; then
                sleep 60
              else
                shutdown -h now
                exit 0
              fi
            done
            shutdown -h now
          ' >/tmp/sunnycase-shutdown.log 2>&1 &
