name: Sunny Case Tracker Refresh

on:
  workflow_dispatch:

jobs:
  refresh:
    runs-on: [self-hosted, linux, x64, india]
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Configure git identity
        run: |
          git config user.name "SunnyCaseTracker Bot"
          git config user.email "actions@users.noreply.github.com"

      - name: Refresh data, push, and deploy
        env:
          GITHUB_PAT: ${{ secrets.GH_PAT }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npm run sync-and-publish

      - name: Stop runner instance after queued work completes
        if: always()
        env:
          GITHUB_PAT: ${{ secrets.GH_PAT }}
        run: |
          cat >/tmp/sunnycase-wait-and-shutdown.sh <<'SH'
          #!/usr/bin/env bash
          set +e

          log_file="/tmp/sunnycase-shutdown.log"
          exec >>"$log_file" 2>&1

          repos=("psbaggaai/SunnyCases" "psbaggaai/BaggaCaseTracker")
          workflow="case-refresh.yml"

          echo "$(date -u +%Y-%m-%dT%H:%M:%SZ) starting Sunny shutdown guard"

          github_has_active_runs() {
            [ -n "${GITHUB_PAT:-}" ] || return 1
            for repo in "${repos[@]}"; do
              for state in queued in_progress; do
                body=$(curl -fsS \
                  -H "Authorization: Bearer ${GITHUB_PAT}" \
                  -H "Accept: application/vnd.github+json" \
                  "https://api.github.com/repos/${repo}/actions/workflows/${workflow}/runs?status=${state}&per_page=20") || return 0
                count=$(printf "%s" "$body" | node -e 'let s="";process.stdin.on("data",d=>s+=d);process.stdin.on("end",()=>{try{process.stdout.write(String((JSON.parse(s).workflow_runs||[]).length));}catch{process.stdout.write("1");}});')
                if [ "${count:-1}" -gt 0 ]; then
                  return 0
                fi
              done
            done
            return 1
          }

          local_runner_active() {
            pgrep -fa "[R]unner.Worker" >/dev/null 2>&1
          }

          sleep 90
          for attempt in $(seq 1 120); do
            if github_has_active_runs || local_runner_active; then
              echo "$(date -u +%Y-%m-%dT%H:%M:%SZ) active tracker work detected; waiting (${attempt}/120)"
              sleep 60
            else
              echo "$(date -u +%Y-%m-%dT%H:%M:%SZ) no active tracker work found; shutting down"
              sudo shutdown -h now
              exit 0
            fi
          done

          echo "$(date -u +%Y-%m-%dT%H:%M:%SZ) wait limit reached; shutting down"
          sudo shutdown -h now
          SH
          chmod +x /tmp/sunnycase-wait-and-shutdown.sh
          unit="sunnycase-wait-and-shutdown-${GITHUB_RUN_ID:-manual}"
          if command -v systemd-run >/dev/null 2>&1; then
            sudo systemd-run --unit="$unit" --collect --setenv="GITHUB_PAT=${GITHUB_PAT:-}" /tmp/sunnycase-wait-and-shutdown.sh
          else
            nohup setsid /tmp/sunnycase-wait-and-shutdown.sh >/dev/null 2>&1 &
          fi
